<!--
  Caldis logo — favicon.

  DO NOT edit geometry here in isolation. Single source of truth for
  the mark lives at:
    src/brand/geometry.ts   (numeric constants)
    src/brand/LogoMark.astro (reusable inline component)

  This file is served directly at /favicon.svg by the browser, so
  it can't be generated at Astro render time. When the geometry
  changes, mirror the new numbers here manually. Values below match
  the constants in geometry.ts at the time of the last sync.

    FRAME:     x=5 y=5 w=22 h=22 stroke=1.75
    DIAGONAL:  (11,22) → (22,11) stroke=3.25
    FADE:      100% at bottom terminal → 50% at top terminal
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient
      id="diag"
      gradientUnits="userSpaceOnUse"
      x1="11" y1="22"
      x2="22" y2="11">
      <stop offset="0" stop-color="#1b1917" stop-opacity="1"/>
      <stop offset="1" stop-color="#1b1917" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" fill="#e6e0d2"/>
  <rect
    x="5" y="5"
    width="22" height="22"
    fill="none"
    stroke="#1b1917"
    stroke-width="1.75"
    stroke-linejoin="miter"/>
  <line
    x1="11" y1="22"
    x2="22" y2="11"
    stroke="url(#diag)"
    stroke-width="3.25"
    stroke-linecap="butt"/>
</svg>
