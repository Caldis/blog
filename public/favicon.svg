<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Caldis logo mark v3. Same hierarchy as v2 (light frame + bold
    diagonal), but the diagonal now fades bottom→top, full at its
    lower terminal and 50% at the upper. Reads as "the italic stroke
    lifting off the page", and matches the About page's interactive
    dot-matrix rendering where diagonal dots fade along the same axis.
  -->
  <defs>
    <linearGradient
      id="diag"
      gradientUnits="userSpaceOnUse"
      x1="11" y1="22"
      x2="22" y2="11">
      <stop offset="0" stop-color="#1b1917" stop-opacity="1"/>
      <stop offset="1" stop-color="#1b1917" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" fill="#e6e0d2"/>
  <rect
    x="5" y="5"
    width="22" height="22"
    fill="none"
    stroke="#1b1917"
    stroke-width="1.75"
    stroke-linejoin="miter"/>
  <line
    x1="11" y1="22"
    x2="22" y2="11"
    stroke="url(#diag)"
    stroke-width="3.25"
    stroke-linecap="butt"/>
</svg>
